<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>welcome to the grassic</title>
    <style>
        /* 清除默认边距 */
        body, html {
            margin:0;
            padding:0;
            height:100%;
            width:100%;
        }
        /* line */
        .top-line {
            width:100%;
            height:1px; /* 线条高度 */
            background-color:#808080; /* 线条颜色 */
            position: absolute; /* 绝对定位 */
            top: 40px; /* 距离顶部40px */
            left: 0; /* 紧贴左侧 */
        } 
         /* grassic_logo */
        .logo-img {
            position:absolute;
            top:10px; /* 图片距离顶部10px */
            left:20px; /* 图片距离左侧20px */
            height:25px; /* 设置图片高度，宽度会自动等比例缩放 */            
        }                    
    </style>
</head>
<body>
    <!-- 左上角的 Logo 图片 -->
    <img src="grassic.png" alt="grassic" class="logo-img">
    
    <!-- 位于顶部的横线，留空 -->
    <div class="top-line"></div>
</body>
</html>
